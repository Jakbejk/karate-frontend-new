<div class="container mt-4">
  <div class="card shadow-sm">
    <div class="card-header">
      <h5 class="mb-0">{{ 'user.title' | translate }}</h5>
    </div>
    <div class="card-body p-0">
      <ag-grid-angular
        [theme]="userTable.theme"
        [columnDefs]="userTable.columnDefs"
        [defaultColDef]="userTable.defaultColDef"
        [localeText]="userTable.localeText"
        [rowModelType]="'infinite'"
        [cacheBlockSize]="userTable.pageSize"
        [paginationPageSize]="userTable.pageSize"
        [pagination]="true"
        (gridReady)="userTable.onGridReady($event)"
        style="height: 520px; width: 100%;">
      </ag-grid-angular>
    </div>
  </div>
</div>
